<main>
    <section class="cadastro">
    
        <h2>Cadastrar Usuário</h2>
    
        <label for="nome">Nome:</label>
        <input type="text" [(ngModel)]="nome" name="nome" id="nome" placeholder="Digite o nome aqui">
    
        <label for="email">E-mail:</label>
        <input type="email" [(ngModel)]="email" name="email" id="email" placeholder="exemplo@exemplo.com">
    
        <input type="submit"  (click)="gravar()" value="Gravar" id="gravar">
        <input type="submit" (click)="cancelar()" value="Cancelar" id="cancelar">
    
    </section>
    <section class="lista">
        <h2>Usuários Cadastrados</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- <tr>
                    <td>{{ nome}}</td>
                    <td>{{ status }}</td>
                    <td>
                        <button type="submit" value="Deletar">🗑️</button>
                    </td>
                </tr> -->
            </tbody>
        </table>

    </section>
</main>
